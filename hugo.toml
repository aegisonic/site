baseURL = "https://aegisonic.org/"
languageCode = "en-us"

title = "Aegisonic"
description= "An adaptive headset designed to reduce auditory overstimulation & distress in autism."

[menus]
    [[menus.main]]
        name = 'About'
        url = '/about'
        weight = 1
    
    [[menus.main]]
        name = 'Blog'
        url = '/blog'
        weight = 2

    [[menus.main]]
        name = 'Gallery'
        url = '/gallery'
        weight = 3

[params]
    tagline = "Equitable acoustics"

    FaviconSVG = "/images/favicon.svg"
    Favicon32 = "/images/favicon-32x32.png"
    Favicon16 = "/images/favicon-16x16.png"

    
    [params.hero]
        link = "/about"
        cta = "Learn more"

[module]
    [module.hugoVersion]
        extended = false
        min = "0.146.0"

[caches]
  [caches.images]
    dir = ':cacheDir/images'